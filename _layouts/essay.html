---
layout: default
---

<article class="essay">
  <header class="essay-header">
    <p class="eyebrow">
      {% if page.lang == 'fa' %}
      مقاله
      {% else %}
      Essay
      {% endif %}
    </p>
    <h1>{{ page.title }}</h1>
    {% if page.date %}
    <time datetime="{{ page.date | date_to_xmlschema }}">
      {% if page.lang == 'fa' %}
      {{ page.date | date: "%Y-%m-%d" }}
      {% else %}
      {{ page.date | date: "%B %-d, %Y" }}
      {% endif %}
    </time>
    {% endif %}
  </header>

  <div class="essay-content">
    {{ content }}
  </div>
</article>
